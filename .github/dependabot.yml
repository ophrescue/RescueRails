version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  versioning-strategy: lockfile-only
  groups:
    minor-and-patch:
      update-types:
      - minor
      - patch
  ignore:
  - dependency-name: rubocop-rspec
    versions:
    - "< 1.31, >= 1.30.a"
  - dependency-name: chartkick
    versions:
    - 4.0.0
    - 4.0.2
  - dependency-name: stripe
    versions:
    - 5.31.0
  - dependency-name: database_cleaner
    versions:
    - 2.0.0

- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  groups:
    minor-and-patch:
      update-types:
      - minor
      - patch

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  groups:
    minor-and-patch:
      update-types:
      - minor
      - patch
